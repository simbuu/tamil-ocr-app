{% extends "base.html" %}
{% block title %}Reports | Tamil OCR{% endblock %}

{% block content %}
<div class="page-header">
  <h1>📄 Reports</h1>
  <p>Generate daily, monthly and customer-level transaction reports. Download as PDF.</p>
</div>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:1.5rem">

  <!-- Daily Report -->
  <div class="card">
    <h2 class="card-title">📅 Daily Report</h2>
    <label>Select Date</label>
    <input class="input" type="date" id="daily-date" />
    <div class="flex gap-1 mt-2">
      <button class="btn btn-primary btn-sm" onclick="loadDaily()">View</button>
    </div>
    <div id="daily-result" class="mt-2"></div>
  </div>

  <!-- Monthly Report -->
  <div class="card">
    <h2 class="card-title">📆 Monthly Report</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
      <div>
        <label>Year</label>
        <input class="input" type="number" id="monthly-year" value="${new Date().getFullYear()}" />
      </div>
      <div>
        <label>Month</label>
        <select class="input" id="monthly-month">
          ${Array.from({length:12},(_,i)=>`<option value="${i+1}">${new Date(0,i).toLocaleString('en',{month:'long'})}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="flex gap-1 mt-2">
      <button class="btn btn-primary btn-sm" onclick="loadMonthly()">View</button>
      <button class="btn btn-outline btn-sm" onclick="downloadMonthly()">⬇ PDF</button>
    </div>
    <div id="monthly-result" class="mt-2"></div>
  </div>

  <!-- Customer Report -->
  <div class="card">
    <h2 class="card-title">👤 Customer Report</h2>
    <label>Customer Name</label>
    <input class="input" id="cust-name" placeholder="Enter customer name…" />
    <div class="flex gap-1 mt-2">
      <button class="btn btn-primary btn-sm" onclick="loadCustomer()">View</button>
      <button class="btn btn-outline btn-sm" onclick="downloadCustomer()">⬇ PDF</button>
    </div>
    <div id="customer-result" class="mt-2"></div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
  // Defaults
  const today = new Date();
  document.getElementById('daily-date').value   = today.toISOString().split('T')[0];
  document.getElementById('monthly-year').value = today.getFullYear();
  document.getElementById('monthly-month').value= today.getMonth() + 1;

  function renderSummaryTable(flowers, grandTotal) {
    if (!flowers.length) return '<p class="text-muted text-sm">No data for this period.</p>';
    return `
      <div class="table-wrap" style="margin-top:.75rem">
        <table>
          <thead><tr><th>Flower</th><th>Weight (kg)</th><th>Amount (₹)</th><th>Txns</th></tr></thead>
          <tbody>
            ${flowers.map(f=>`
              <tr>
                <td><span class="badge badge-green">${f.flower_type}</span></td>
                <td class="font-mono">${f.total_weight_kg.toFixed(2)}</td>
                <td class="font-mono" style="color:var(--green-700);font-weight:600">₹ ${f.total_amount.toFixed(2)}</td>
                <td class="font-mono">${f.transaction_count}</td>
              </tr>
            `).join('')}
            <tr style="background:var(--green-100)">
              <td colspan="2" style="font-weight:700">Grand Total</td>
              <td class="font-mono" style="color:var(--green-900);font-weight:700">₹ ${grandTotal.toFixed(2)}</td>
              <td></td>
            </tr>
          </tbody>
        </table>
      </div>`;
  }

  // ── Daily ──────────────────────────────────────────────────────────────────
  window.loadDaily = async () => {
    const d = document.getElementById('daily-date').value;
    const el = document.getElementById('daily-result');
    el.innerHTML = '<p class="text-muted text-sm">Loading…</p>';
    try {
      const data = await api(`/api/reports/daily?on_date=${d}`);
      el.innerHTML = `<p class="text-sm text-muted">Date: <strong>${data.date}</strong></p>` + renderSummaryTable(data.flowers, data.grand_total);
    } catch(e) { el.innerHTML = `<div class="alert alert-error">${e.message}</div>`; }
  };

  // ── Monthly ────────────────────────────────────────────────────────────────
  window.loadMonthly = async () => {
    const y = document.getElementById('monthly-year').value;
    const m = document.getElementById('monthly-month').value;
    const el = document.getElementById('monthly-result');
    el.innerHTML = '<p class="text-muted text-sm">Loading…</p>';
    try {
      const data = await api(`/api/reports/monthly?year=${y}&month=${m}`);
      el.innerHTML = renderSummaryTable(data.flowers, data.grand_total);
    } catch(e) { el.innerHTML = `<div class="alert alert-error">${e.message}</div>`; }
  };

  window.downloadMonthly = () => {
    const y = document.getElementById('monthly-year').value;
    const m = document.getElementById('monthly-month').value;
    window.open(`/api/reports/monthly/pdf?year=${y}&month=${m}`, '_blank');
  };

  // ── Customer ───────────────────────────────────────────────────────────────
  window.loadCustomer = async () => {
    const name = document.getElementById('cust-name').value.trim();
    if (!name) return;
    const el = document.getElementById('customer-result');
    el.innerHTML = '<p class="text-muted text-sm">Loading…</p>';
    try {
      const data = await api(`/api/reports/customer?name=${encodeURIComponent(name)}`);
      el.innerHTML = `
        <div class="alert alert-success" style="margin-bottom:.75rem">
          <strong>${data.customer_name}</strong> — ${data.transaction_count} transactions |
          ${data.total_weight_kg} kg | ₹ ${data.total_amount.toFixed(2)}
        </div>
        <div class="table-wrap" style="max-height:300px;overflow-y:auto">
          <table>
            <thead><tr><th>Date</th><th>Flower</th><th>kg</th><th>Amount</th></tr></thead>
            <tbody>
              ${data.transactions.map(tx=>`
                <tr>
                  <td class="font-mono text-sm">${tx.transaction_date}</td>
                  <td><span class="badge badge-green">${tx.flower_type}</span></td>
                  <td class="font-mono">${tx.weight_kg.toFixed(2)}</td>
                  <td class="font-mono" style="color:var(--green-700);font-weight:600">₹ ${tx.total_amount.toFixed(2)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    } catch(e) { el.innerHTML = `<div class="alert alert-error">${e.message}</div>`; }
  };

  window.downloadCustomer = () => {
    const name = document.getElementById('cust-name').value.trim();
    if (!name) return;
    window.open(`/api/reports/customer/pdf?name=${encodeURIComponent(name)}`, '_blank');
  };
</script>
{% endblock %}
